<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #00e5a0;
    --accent-dim: #00e5a015;
    --accent2: #7c6dfa;
    --text: #eef0f6;
    --muted: #6b7494;
    --danger: #ff5c5c;
    --warn: #ffb84d;
    --cert-c: #7c6dfa;
    --skill-c: #00e5a0;
    --proj-c: #ffb84d;
    --tool-c: #ff7eb3;
    --done-bg: #1a2420;
    --radius: 14px;
    --radius-sm: 9px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .logo { display: flex; align-items: center; gap: 9px; }
  .logo img { width: 30px; height: 30px; }
  .logo h1 { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
  .logo h1 span { color: var(--accent); }
  .streak-badge {
    font-size: 12px; color: var(--muted);
    background: var(--surface2); padding: 4px 11px;
    border-radius: 20px; border: 1px solid var(--border);
  }

  /* PROGRESS */
  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .pbar-bg { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .pbar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width .5s ease; }
  .pbar-label { font-size: 12px; color: var(--muted); min-width: 36px; text-align: right; }

  /* STATS */
  .stats { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .stats::-webkit-scrollbar { display: none; }
  .stat {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 13px; white-space: nowrap; flex-shrink: 0;
  }
  .stat b { font-size: 13px; font-weight: 700; color: var(--text); }
  .stat span { font-size: 11px; color: var(--muted); margin-left: 4px; }

  /* TABS */
  .tabs {
    display: flex; gap: 6px; overflow-x: auto;
    padding: 12px 16px 0; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 7px 15px; font-size: 13px; color: var(--muted); cursor: pointer;
    white-space: nowrap; transition: all .15s; flex-shrink: 0;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

  /* SEARCH */
  .search-wrap { padding: 10px 16px 0; }
  .search-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px; color: var(--text);
    font-size: 14px; outline: none; transition: border-color .15s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }

  /* LIST */
  .list { padding: 12px 16px 110px; display: flex; flex-direction: column; gap: 8px; }

  /* SECTION LABEL */
  .sec-label {
    font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
    color: var(--muted); margin: 10px 0 4px; padding: 0 2px;
  }

  /* ITEM */
  .item {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 13px 14px; display: flex; align-items: flex-start; gap: 12px;
    transition: border-color .15s, opacity .2s;
    -webkit-user-select: none; user-select: none;
  }
  .item[data-cat="cert"]    { border-left: 3px solid var(--cert-c); }
  .item[data-cat="skill"]   { border-left: 3px solid var(--skill-c); }
  .item[data-cat="project"] { border-left: 3px solid var(--proj-c); }
  .item[data-cat="tool"]    { border-left: 3px solid var(--tool-c); }
  .item.done { background: var(--done-bg); border-left-color: #2a4a3e !important; opacity: .65; }
  .item.done .item-name { text-decoration: line-through; color: var(--muted); }

  /* CHECKBOX */
  .check {
    width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; margin-top: 1px; transition: all .15s;
  }
  .check:active { transform: scale(.85); }
  .item.done .check { background: var(--accent); border-color: var(--accent); }
  .check-svg { display: none; }
  .item.done .check-svg { display: block; }

  /* ITEM BODY */
  .item-body { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; }
  .item-sub  { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .item-tags { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; align-items: center; }

  /* TAGS */
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .t-free  { background: #00e5a015; color: #00e5a0; }
  .t-cert  { background: #7c6dfa18; color: #a09bfa; }
  .t-proj  { background: #ffb84d18; color: #ffb84d; }
  .t-prio  { background: #ff5c5c18; color: #ff7070; }
  .t-paid  { background: #ffffff0d; color: #8a9bb5; }
  .t-lab   { background: #7eb8ff18; color: #7eb8ff; }
  .t-tool  { background: #ff7eb318; color: #ff7eb3; }
  .done-date { font-size: 11px; color: var(--accent); }

  /* LINK */
  .item-link {
    flex-shrink: 0; width: 32px; height: 32px; border-radius: var(--radius-sm);
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; margin-top: 1px; transition: background .15s;
  }
  .item-link:active { background: var(--border); }
  .item-link svg { width: 15px; height: 15px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* EMPTY */
  .empty { text-align: center; padding: 48px 0; color: var(--muted); font-size: 14px; }

  /* ROADMAP */
  .roadmap-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 15px 16px; overflow: hidden; position: relative;
  }
  .roadmap-card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
  }
  .roadmap-phase { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--accent); margin-bottom: 3px; }
  .roadmap-period { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .roadmap-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
  .roadmap-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
  .roadmap-steps { display: flex; flex-direction: column; gap: 7px; }
  .roadmap-step { font-size: 13px; color: var(--text); display: flex; gap: 9px; align-items: flex-start; }
  .roadmap-step::before { content: "→"; color: var(--accent); flex-shrink: 0; margin-top: 1px; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; padding: 8px 0 env(safe-area-inset-bottom, 16px);
    z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; padding: 4px 0; background: none; border: none;
    color: var(--muted); font-size: 10px; font-weight: 600; transition: color .15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: #000; font-size: 13px; font-weight: 700;
    padding: 9px 20px; border-radius: 20px; opacity: 0;
    transition: all .3s; pointer-events: none; white-space: nowrap; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

  {phase:"Phase 3",period:"Dec 2026 – May 2027",title:"Offensive skills",desc:"Shift from defensive to offensive knowledge for pentest roles.",steps:["Complete eJPT prep + pass exam","Join Hack The Box Pro Labs","Build 3 new projects: honeypot, IDS, phishing detector","Compete in 2+ CTFs on CTFtime.org"]},
  {phase:"Phase 4",period:"Jun 2027 – May 2028",title:"Specialise & place",desc:"Final year — pick a track and aim for placement.",steps:["Choose: Cloud Security / Pentest / SOC Analyst","Target CCSP (cloud) or OSCP (pentest)","Apply for internships & bug bounty programs","Polish GitHub portfolio to 10+ quality projects"]},
];

const TAG_LABELS={cert:"Cert",free:"Free",proj:"Project",prio:"Priority",paid:"Paid",lab:"Lab",tool:"Tool"};
const TAG_CLS={cert:"t-cert",free:"t-free",proj:"t-proj",prio:"t-prio",paid:"t-paid",lab:"t-lab",tool:"t-tool"};
const CAT_LABELS={cert:"Certifications",skill:"Skills & Courses",project:"Projects",tool:"Tools & Labs"};
const NAV_IDS=["nb-all","nb-prio","nb-roadmap","nb-done"];

// ── STATE ──────────────────────────────────────────────────────────────────
let state={};
let currentTab="all";

function save(){try{localStorage.setItem("feba_v3",JSON.stringify(state));}catch(e){}}
function load(){
  try{const d=localStorage.getItem("feba_v3");if(d)state=JSON.parse(d);}catch(e){state={};}
  DATA.forEach(d=>{if(d.pre&&!state[d.id])state[d.id]={done:true,date:"Pre-completed"};});
}

// ── INTERACTIONS ───────────────────────────────────────────────────────────
function toggle(id){
  const item=DATA.find(d=>d.id===id);
  if(!item)return;
  if(state[id]&&state[id].done){
    delete state[id];
    showToast("Marked as to-do");
  } else {
    const d=new Date();
    state[id]={done:true,date:d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"2-digit"})};
    showToast("✓ "+item.name.split("—")[0].trim()+" done!");
    updateStreak();
  }
  save();render();
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function updateStreak(){
  const today=new Date().toDateString();
  try{
    const s=JSON.parse(localStorage.getItem("feba_streak")||'{"count":0,"last":"","best":0}');
    if(s.last!==today){
      const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
      s.count=s.last===yesterday.toDateString()?s.count+1:1;
      s.last=today;s.best=Math.max(s.best||0,s.count);
      localStorage.setItem("feba_streak",JSON.stringify(s));
    }
  }catch(e){}
}

function setTab(t){
  currentTab=t;
  document.querySelectorAll(".tab").forEach(el=>{
    const map={all:"All",cert:"Certifications",skill:"Courses",project:"Projects",tool:"Tools & Labs",prio:"⭐ Priority",done:"✓ Done",roadmap:"Roadmap"};
    el.classList.toggle("active",el.textContent.trim()===map[t]);
  });
  NAV_IDS.forEach(id=>document.getElementById(id)&&document.getElementById(id).classList.remove("active"));
  const navMap={all:"nb-all",prio:"nb-prio",roadmap:"nb-roadmap",done:"nb-done"};
  if(navMap[t])document.getElementById(navMap[t]).classList.add("active");
  document.getElementById("search-wrap").style.display=(t==="roadmap")?"none":"block";
  render();
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderStats(){
  const done=Object.values(state).filter(s=>s&&s.done).length;
  const total=DATA.length;
  document.getElementById("s-done").textContent=done;
  document.getElementById("s-total").textContent=total;
  document.getElementById("s-certs").textContent=DATA.filter(d=>d.cat==="cert"&&state[d.id]&&state[d.id].done).length;
  document.getElementById("s-proj").textContent=DATA.filter(d=>d.cat==="project"&&state[d.id]&&state[d.id].done).length;
  document.getElementById("s-prio").textContent=DATA.filter(d=>d.tags.includes("prio")&&!(state[d.id]&&state[d.id].done)).length;
  const pct=Math.round(done/total*100);
  document.getElementById("pbar").style.width=pct+"%";
  document.getElementById("pct").textContent=pct+"%";
  try{
    const s=JSON.parse(localStorage.getItem("feba_streak")||'{"count":0}');
    document.getElementById("streak-badge").textContent="🔥 "+s.count+" day"+(s.count===1?"":"s");
  }catch(e){}
}

function itemHTML(d){
  const isDone=state[d.id]&&state[d.id].done;
  return`<div class="item${isDone?" done":""}" data-cat="${d.cat}">
    <div class="check" onclick="toggle('${d.id}')">
      <svg class="check-svg" viewBox="0 0 24 24" width="13" height="13" stroke="#000" stroke-width="3.5" fill="none"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="item-body">
      <div class="item-name">${d.name}</div>
      <div class="item-sub">${d.sub}</div>
      <div class="item-tags">
        ${d.tags.map(t=>`<span class="tag ${TAG_CLS[t]||"t-free"}">${TAG_LABELS[t]||t}</span>`).join("")}
        ${isDone&&state[d.id].date!=="Pre-completed"?`<span class="done-date">✓ ${state[d.id].date}</span>`:""}
      </div>
    </div>
    <a class="item-link" href="${d.link}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </a>
  </div>`;
}

function render(){
  renderStats();
  const q=document.getElementById("search").value.toLowerCase();
  const listEl=document.getElementById("list");

  if(currentTab==="roadmap"){
    listEl.innerHTML=ROADMAP.map((r,i)=>`
      <div class="roadmap-card">
        <div class="roadmap-phase">${r.phase}</div>
        <div class="roadmap-period">${r.period}</div>
        <div class="roadmap-title">${r.title}</div>
        <div class="roadmap-desc">${r.desc}</div>
        <div class="roadmap-steps">${r.steps.map(s=>`<div class="roadmap-step">${s}</div>`).join("")}</div>
      </div>`).join("");
    return;
  }

  let items=DATA.filter(d=>{
    if(q&&!d.name.toLowerCase().includes(q)&&!d.sub.toLowerCase().includes(q))return false;
    if(currentTab==="done")return state[d.id]&&state[d.id].done;
    if(currentTab==="prio")return d.tags.includes("prio")&&!(state[d.id]&&state[d.id].done);
    if(currentTab!=="all")return d.cat===currentTab;
    return true;
  });

  if(!items.length){listEl.innerHTML='<div class="empty">Nothing here — keep pushing! 💪</div>';return;}

  if(currentTab==="all"||currentTab==="done"){
    const groups={};
    items.forEach(d=>{const g=CAT_LABELS[d.cat];if(!groups[g])groups[g]=[];groups[g].push(d);});
    listEl.innerHTML=Object.entries(groups).map(([g,its])=>`<div class="sec-label">${g}</div>${its.map(itemHTML).join("")}`).join("");
  } else {
    listEl.innerHTML=items.map(itemHTML).join("");
  }
}

// ── SERVICE WORKER ─────────────────────────────────────────────────────────
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js")
      .then(()=>console.log("SW registered"))
      .catch(e=>console.log("SW failed:",e));
  });
}

// ── INIT ───────────────────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
